<svg width="880" height="220" viewBox="0 0 880 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F0C29"/>
      <stop offset="0.5" stop-color="#302B63"/>
      <stop offset="1" stop-color="#24243E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5D4"/>
      <stop offset="0.5" stop-color="#9B5DE5"/>
      <stop offset="1" stop-color="#F15BB5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="880" height="220" rx="18" fill="url(#bg)"/>

  <!-- circuit traces -->
  <g stroke="#3D3A6B" stroke-width="2" opacity="0.7">
    <path d="M40 40 H 160 L 190 70 H 280"/>
    <path d="M40 180 H 120 L 150 150 H 240"/>
    <path d="M840 40 H 720 L 690 70 H 620"/>
    <path d="M840 180 H 760 L 730 150 H 660"/>
  </g>
  <g fill="#00F5D4" opacity="0.9">
    <circle cx="280" cy="70" r="4"/>
    <circle cx="240" cy="150" r="4"/>
    <circle cx="620" cy="70" r="4"/>
    <circle cx="660" cy="150" r="4"/>
  </g>

  <!-- gamepad mark -->
  <g filter="url(#glow)">
    <rect x="395" y="34" width="90" height="56" rx="28" stroke="url(#accent)" stroke-width="4" fill="none"/>
    <!-- d-pad -->
    <path d="M418 62 H 434 M426 54 V 70" stroke="#00F5D4" stroke-width="4" stroke-linecap="round"/>
    <!-- buttons -->
    <circle cx="456" cy="56" r="4" fill="#F15BB5"/>
    <circle cx="466" cy="66" r="4" fill="#9B5DE5"/>
    <!-- neural spark -->
    <path d="M440 26 L 444 34 L 436 34 Z" fill="#FEE440"/>
  </g>

  <!-- wordmark -->
  <text x="440" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#FFFFFF" letter-spacing="2">AWESOME <tspan fill="url(#accent)">AI GAME</tspan></text>
  <text x="440" y="184" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#A7A4D4" letter-spacing="6">PLAY THE FUTURE · GAMES POWERED BY AI</text>
</svg>
